<!DOCTYPE html>
<html>
<head>
  <title>CSS Selectors Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Amina Khalid - CSS Practice</h1>
  
  <section id="hero">
    <p>This is the hero section with red small text.</p>
  </section>
  
  <h2>Features</h2>
  <div class="feature bordered">
    <p>Feature 1 with red border and padding.</p>
  </div>
  
  <h2>Pricing</h2>
  <div class="price highlight">
    <p>Price box with light blue background.</p>
  </div>
  
  <a href="#" class="external-link">External Link Below Box</a>
  
  <h2>Form</h2>
  <form>
    <input type="email" placeholder="Email - green border">
    <input type="password" placeholder="Password - red border">
    <button type="submit">Hover Me - turns yellow</button>
  </form>
</body>
</html>
